ext.serviceProjects = [
    'device-microservice',
    'user-microservice',
    'social-microservice',
    'messaging-microservice',
    'main-server'
]

tasks.register('run') {
    group = 'application'
    description = 'Runs all microservices and the main API gateway. Use: .\\gradlew.bat --parallel runAllServices'

    dependsOn serviceProjects.collect { ":${it}:bootRun" }
}
